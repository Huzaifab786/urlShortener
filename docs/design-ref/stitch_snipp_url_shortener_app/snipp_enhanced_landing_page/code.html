<style>

<script>
        // Typing effect
        const words = ["short", "simple", "fast", "trackable"];
        let i = 0;
        let timer;

        function typingEffect() {
            let word = words[i].split("");
            var loopTyping = function() {
                if (word.length > 0) {
                    document.getElementById('typing-text').innerHTML += word.shift();
                } else {
                    setTimeout(deletingEffect, 2000);
                    return false;
                }
                timer = setTimeout(loopTyping, 150);
            };
            loopTyping();
        }

        function deletingEffect() {
            let word = words[i].split("");
            var loopDeleting = function() {
                if (word.length > 0) {
                    word.pop();
                    document.getElementById('typing-text').innerHTML = word.join("");
                } else {
                    if (words.length > (i + 1)) {
                        i++;
                    } else {
                        i = 0;
                    }
                    setTimeout(typingEffect, 500);
                    return false;
                }
                timer = setTimeout(loopDeleting, 100);
            };
            loopDeleting();
        }
        
        // Start typing effect initially with "short" already there, so we wait then delete
        document.getElementById('typing-text').innerHTML = "short";
        setTimeout(deletingEffect, 2000);

        // Live Counter
        let count = 1204392;
        setInterval(() => {
            count += Math.floor(Math.random() * 3) + 1;
            document.getElementById('live-counter').innerText = count.toLocaleString();
        }, 3500);

        // Favicon fetcher
        const urlInput = document.getElementById('url-input');
        const faviconImg = document.getElementById('url-favicon');
        const linkIcon = document.getElementById('link-icon');

        urlInput.addEventListener('input', function() {
            try {
                let urlStr = this.value;
                if(urlStr && !urlStr.startsWith('http')) {
                    urlStr = 'http://' + urlStr;
                }
                const url = new URL(urlStr);
                faviconImg.src = `https://www.google.com/s2/favicons?domain=${url.hostname}&sz=64`;
                faviconImg.classList.remove('hidden');
                faviconImg.classList.add('opacity-100');
                linkIcon.classList.add('hidden');
                linkIcon.classList.remove('opacity-100');
            } catch (e) {
                // Invalid URL, revert to icon
                if(this.value.length === 0) {
                    faviconImg.classList.add('hidden');
                    faviconImg.classList.remove('opacity-100');
                    linkIcon.classList.remove('hidden');
                    linkIcon.classList.add('opacity-100');
                }
            }
        });

        // Shorten Animation
        const shortenBtn = document.getElementById('shorten-btn');
        const snipResultLong = document.getElementById('snip-result-long');
        const snipResultShort = document.getElementById('snip-result-short');
        const snipContainer = document.getElementById('recent-snip-container');

        shortenBtn.addEventListener('click', function() {
            if(!urlInput.value) return;
            
            let originalUrl = urlInput.value;
            
            // Just visually update the existing placeholder for the demo
            snipResultLong.classList.remove('compress-anim');
            void snipResultLong.offsetWidth; // trigger reflow
            
            snipResultLong.innerText = originalUrl;
            snipResultShort.innerText = "snipp.co/" + Math.random().toString(36).substring(2, 7);
            
            snipResultLong.classList.add('compress-anim');
            
            // Make sure container is visible
            snipContainer.style.opacity = '1';
            snipContainer.style.transform = 'translateY(0)';
            
            urlInput.value = '';
            // Reset icon
            faviconImg.classList.add('hidden');
            faviconImg.classList.remove('opacity-100');
            linkIcon.classList.remove('hidden');
            linkIcon.classList.add('opacity-100');
        });
    </script>
