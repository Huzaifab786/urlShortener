<input class="w-full h-11 px-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
<!-- Password Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="password">Password</label>
<input class="w-full h-11 px-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between pt-1">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-label-md text-label-md text-on-surface-variant" for="remember-me">Remember me</label>
</div>
<div class="font-label-md text-label-md">
<a class="text-primary hover:text-primary-container font-medium transition-colors" href="#">Forgot Password?</a>
</div>
</div>
